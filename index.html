<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingdom Leadership Discovery</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#0f1117}::-webkit-scrollbar-thumb{background:#2d3748;border-radius:3px}
.btn{cursor:pointer;border-radius:6px;border:1px solid #2d3748;background:transparent;color:#94a3b8;padding:5px 12px;font-size:12px;font-family:inherit;transition:all 0.15s}
.btn:hover{background:#1a2035;color:#e2e8f0}
.btn-primary{background:#e2e8f0!important;color:#0f1117!important;border-color:#e2e8f0!important;font-weight:500}
.btn-primary:hover{background:#cbd5e1!important}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
select,input{font-family:inherit;background:#1a2035;border:1px solid #2d3748;color:#e2e8f0;border-radius:6px;outline:none}
select:focus,input:focus{border-color:#4a5568}
optgroup{color:#94a3b8;font-weight:600}
option{color:#e2e8f0;background:#1a2035}
.pcard{border-radius:6px;cursor:pointer;padding:8px 10px;margin-bottom:2px;border-left:2px solid transparent;transition:all 0.15s}
.pcard:hover{background:#1a2035}
.pcard.active{background:#1a2035;border-left-color:#B8860B}
.mtab{cursor:pointer;padding:10px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:#64748b;font-size:11px;font-family:inherit;transition:all 0.15s;white-space:nowrap}
.mtab:hover{color:#94a3b8}
.mtab.active{color:var(--tab-color,#B8860B);border-bottom-color:var(--tab-color,#B8860B);font-weight:600}
.card{background:#1a2035;border:1px solid #2d3748;border-radius:10px;padding:16px 18px;margin-bottom:10px}
.badge{border-radius:5px;padding:2px 8px;font-size:10px;font-weight:500}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.spinner{display:inline-block;animation:spin 1s linear infinite}
.err{font-size:11px;color:#fc8181;margin-top:2px}
.entry-bg{
  position:relative;
  min-height:100vh;
  background:url('/bg.jpg') center center / cover no-repeat;
  display:flex;
  flex-direction:column;
}
.entry-bg::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(8,14,24,0.55) 0%,
    rgba(8,14,24,0.45) 40%,
    rgba(5,10,18,0.72) 75%,
    rgba(5,10,18,0.88) 100%
  );
  pointer-events:none;
  z-index:0;
}
.entry-bg > * { position:relative; z-index:1; }
.entry-card{
  background:rgba(15,17,23,0.72);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(184,134,11,0.2);
  border-radius:14px;
  padding:24px 28px;
}
.mountain-label{
  font-size:11px;
  font-weight:600;
  letter-spacing:0.12em;
  text-transform:uppercase;
  opacity:0.85;
  text-shadow:0 1px 8px rgba(0,0,0,0.8);
}
.lake-label{
  font-size:13px;
  font-weight:500;
  letter-spacing:0.08em;
  color:#d4a520;
  opacity:0.9;
  text-shadow:0 1px 12px rgba(0,0,0,0.9);
  text-align:center;
  margin-bottom:6px;
}
</style>

async function storageGet(key) {
  try { const r = await window.storage.get(key); return r ? JSON.parse(r.value) : null; }
  catch(e) { return null; }
}
async function storageSet(key, value) {
  try { await window.storage.set(key, JSON.stringify(value)); return true; }
  catch(e) { return false; }
}
async function getApprovedEmails() { return await storageGet("approved_emails") || []; }
async function isEmailApproved(email) {
  const e = email.toLowerCase().trim();
  const approved = await getApprovedEmails();
  return approved.map(x=>x.toLowerCase().trim()).includes(e);
}
async function addApprovedEmails(text) {
  const current = await getApprovedEmails();
  const newOnes = text.split(/[,\n;]+/).map(e=>e.trim().toLowerCase()).filter(e=>e.includes("@"));
  const merged = [...new Set([...current,...newOnes])];
  await storageSet("approved_emails", merged);
  return {added:newOnes.length, total:merged.length};
}
async function removeEmail(email) {
  const current = await getApprovedEmails();
  const updated = current.filter(e=>e!==email.toLowerCase().trim());
  await storageSet("approved_emails", updated);
  return updated;
}
async function saveProfile(email, profileData) {
  const key = "profile|"+email.toLowerCase().trim();
  const record = {email:email.toLowerCase().trim(), savedAt:Date.now(), ...profileData};
  await storageSet(key, record);
  await storageSet("participant|"+email.toLowerCase().trim(), {
    email:email.toLowerCase().trim(), name:profileData.name,
    personality:profileData.personality, strengths:profileData.strengths,
    gifts:profileData.gifts, savedAt:Date.now()
  });
  return record;
}
async function loadProfile(email) { return await storageGet("profile|"+email.toLowerCase().trim()); }
function profileAgeMonths(savedAt) { return (Date.now()-savedAt)/(1000*60*60*24*30.44); }
function profileNeedsRefresh(savedAt) { return profileAgeMonths(savedAt)>=REGEN_MONTHS; }

async function callAI(prompt, cacheKey) {
  if (aiCache[cacheKey]) return aiCache[cacheKey];
  try {
    const r = await fetch("/.netlify/functions/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 1500,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const raw = await r.text();
    

    if (!r.ok) return null;

    const d = JSON.parse(raw);
    if (d.error) { return null; }
    if (!d.content || !d.content.length) { return null; }

    let text = d.content.map(b => b.text || "").join("").trim();
    text = text.replace(/```json|```/g, "").trim();
    const first = text.indexOf("{");
    const last = text.lastIndexOf("}");
    if (first === -1 || last === -1) { return null; }

    const parsed = JSON.parse(text.slice(first, last + 1));
    aiCache[cacheKey] = parsed;
    return parsed;

  } catch(e) {
    
    return null;
  }
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  document.getElementById("app").innerHTML = buildApp();
  attachHandlers();
}

function buildApp() {
  // Route to correct screen based on state.view
  if (state.view === "landing") return buildLanding();
  if (state.view === "login") return buildLogin();
  if (state.view === "notApproved") return buildNotApproved();
  if (state.view === "admin") return buildAdminWrapper();

  const p = state.currentIdx !== null ? state.participants[state.currentIdx] : null;
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #1e293b;background:#111827;flex-wrap:wrap;gap:8px">

      <div style="font-size:15px;font-weight:600;color:#f1f5f9">Unified Profile System</div>

      ${state.participants.length>0?`<span style="font-size:11px;color:#4a5568">${state.participants.length} participant${state.participants.length!==1?"s":""}</span>`:""}
      ${state.isAdmin?`<button class="btn" id="btnGoAdmin" style="font-size:12px;">⚙ Admin</button>`:""}

}

function comboCard(label, theme, color, combo, loading) {

    <div style="font-size:10px;color:#4a5568;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px">${label}</div>
    <div style="font-size:17px;font-weight:500;color:#f1f5f9;margin-bottom:${loading||combo?"10px":"0"};font-family:Georgia,serif">${theme}</div>
    ${loading?`<div style="color:#4a5568;font-size:13px"><span class="spinner">◌</span> Generating your unique profile…</div>`:""}
    ${!loading&&combo?`
      <p style="font-size:13px;line-height:1.75;color:#94a3b8;margin-bottom:10px">${combo.description||""}</p>
      <div style="background:#0f1117;border:1px solid #1e293b;border-radius:6px;padding:9px 12px;margin-bottom:8px">

        <div style="font-size:9px;color:${color};letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px">Reflection & Prayer</div>

function renderM4Section(label, content, color, icon) {
  if (!content) return "";
  const isWarning = icon === "warning";
  const bg = isWarning ? "#7f1d1d22" : (icon === "scripture" ? "#1e3a2f" : "#0f1117");
  const border = isWarning ? "#7f1d1d44" : (icon === "scripture" ? "#2d5a45" : "#1e293b");
  const labelColor = isWarning ? "#fca5a5" : (icon === "scripture" ? "#6ee7b7" : "#4a5568");
  const textColor = isWarning ? "#94a3b8" : (icon === "scripture" ? "#a7f3d0" : "#94a3b8");
  const prefix = isWarning ? "⚠ " : "✦ ";
  return `<div style="background:${bg};border:1px solid ${border};border-radius:6px;padding:11px 14px;margin-bottom:10px">
    <div style="font-size:9px;color:${labelColor};letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;font-weight:600">${prefix}${label}</div>
    <p style="font-size:13px;color:${textColor};font-style:italic;line-height:1.75;margin:0">${content}</p>
  </div>`;
}

function renderM4StrCard(s, p, card) {
  const str = strByName(s);
  const col = str ? dc(str.d) : "#A0522D";
  const theme = card ? (card.cardTheme || s) : s;
  const loading = !card;
  return `<div class="card" style="border-left:3px solid ${col};margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="background:${col}22;color:${col};border:1px solid ${col}44;border-radius:4px;padding:2px 8px;font-size:10px;font-weight:500">${s}</span>
      <span style="font-size:10px;color:#4a5568">× ${p.personality} × ${p.gifts.join(", ")}</span>
    </div>
    ${loading ? `<div style="color:#4a5568;font-size:13px"><span class="spinner">◌</span> Generating ${s} synthesis…</div>` : `
    <div style="font-size:17px;font-weight:500;color:#f1f5f9;margin-bottom:10px;font-family:Georgia,serif">${theme}</div>
    <p style="font-size:13px;line-height:1.75;color:#94a3b8;margin-bottom:10px">${card.description||""}</p>
    ${card.scripture ? `<div style="background:#1e3a2f;border:1px solid #2d5a45;border-radius:6px;padding:9px 12px;margin-bottom:8px">
      <div style="font-size:9px;color:#6ee7b7;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;font-weight:600">✦ Scripture</div>
      <p style="font-size:12px;color:#a7f3d0;font-style:italic;line-height:1.6;margin:0">${card.scripture}</p>
    </div>` : ""}
    ${card.prayer ? `<div style="background:${col}11;border:1px solid ${col}33;border-radius:6px;padding:9px 12px">
      <div style="font-size:9px;color:${col};letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;font-weight:600">✦ Prayer</div>
      <p style="font-size:12px;color:#94a3b8;font-style:italic;line-height:1.75;margin:0">"${card.prayer}"</p>
    </div>` : ""}

function summaryCard(data, color, label) {
  if (!data) return "";
  if (data === "loading") return '<div class="card" style="border-left:3px solid '+color+';margin-bottom:16px"><div style="color:#4a5568;font-size:13px"><span class="spinner">◌</span> Generating '+label+' summary…</div></div>';
  const theme = data.theme || data.bonusTheme || "";
  const main = data.summary || data.synthesis || "";
  const keys = Object.keys(data).filter(k=>!["theme","bonusTheme","summary","synthesis"].includes(k)&&typeof data[k]==="string");
  let h = '<div class="card" style="border-left:4px solid '+color+';margin-bottom:18px">';
  h += '<div style="font-size:9px;color:'+color+';letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700">✦ '+label+' Summary</div>';
  h += '<div style="font-size:21px;font-weight:600;color:#f1f5f9;margin-bottom:10px;font-family:Georgia,serif">'+theme+'</div>';
  h += '<p style="font-size:14px;line-height:1.85;color:#94a3b8;margin-bottom:12px">'+main+'</p>';
  keys.forEach((k,i)=>{
    const lbl = k.replace(/([A-Z])/g," $1").trim();
    const bg = i===keys.length-1 ? color+"11" : "#0f1117";
    const bdr = i===keys.length-1 ? color+"33" : "#1e293b";
    const lc = i===keys.length-1 ? color : "#4a5568";
    h += '<div style="background:'+bg+';border:1px solid '+bdr+';border-radius:6px;padding:10px 14px;margin-bottom:8px"><div style="font-size:9px;color:'+lc+';letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;font-weight:600">✦ '+lbl+'</div><p style="font-size:13px;color:#94a3b8;font-style:italic;line-height:1.7;margin:0">'+data[k]+'</p></div>';
  });
  h += '</div>';
  return h;
}

function buildMatrixContent(p) {
  if (state.activeMatrix==="m1") {
    return `<div style="font-size:9px;color:#B8860B;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;font-weight:600">Matrix 1 · Core Traits · CliftonStrengths × 16 Personalities</div>
    ${summaryCard(state.m1Summary,"#B8860B","Core Traits")}
    ${p.strengths.map(s=>{
      const str=strByName(s);const col=str?dc(str.d):"#B8860B";
      const theme=M1[`${s}|${p.personality}`]||`${s} × ${p.personality}`;
      const combo=state.m1Data[s];
      return comboCard(`${s} × ${p.personality}`,theme,col,combo==="loading"?null:combo,combo==="loading");
    }).join("")}`;
  }
  if (state.activeMatrix==="m2") {
    return `<div style="font-size:9px;color:#4A7C5E;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;font-weight:600">Matrix 2 · Innate Qualities · CliftonStrengths × Spiritual Gifts</div>
    ${summaryCard(state.m2Summary,"#4A7C5E","Innate Qualities")}
    ${p.strengths.map(s=>`
      <div style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:500;color:#e2e8f0;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #1e293b">${s}</div>
        ${p.gifts.map(g=>{
          const theme=M2[`${s}|${g}`]||`${s} × ${g}`;
          const combo=state.m2Data[`${s}|${g}`];
          return comboCard(`${s} × ${g}`,theme,"#4A7C5E",combo==="loading"?null:combo,combo==="loading");
        }).join("")}
      </div>`).join("")}`;
  }
  if (state.activeMatrix==="m3") {
    return `<div style="font-size:9px;color:#6B5B8A;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;font-weight:600">Matrix 3 · Empowered Abilities · 16 Personalities × Spiritual Gifts</div>
    ${summaryCard(state.m3Summary,"#6B5B8A","Empowered Abilities")}
    ${p.gifts.map(g=>{
      const theme=M3[`${p.personality}|${g}`]||`${p.personality} × ${g}`;
      const combo=state.m3Data[g];
      return comboCard(`${p.personality} × ${g}`,theme,"#6B5B8A",combo==="loading"?null:combo,combo==="loading");
    }).join("")}`;
  }
  if (state.activeMatrix==="m4") {
    const C = "#A0522D";
    const d = state.m4Data;
    const cards = state.m4Cards || {};
    let html = `<div style="font-size:9px;color:${C};letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;font-weight:600">Matrix 4 · Unified Potential · All Three Combined</div>`;
    if (!d) {
      html += `<div class="card" style="border-left:3px solid ${C}"><div style="color:#4a5568;font-size:13px"><span class="spinner">◌</span> Generating your Master Synthesis…</div></div>`;
    } else {
      html += `<div class="card" style="border-left:4px solid ${C};margin-bottom:18px">`;
      html += `<div style="font-size:9px;color:${C};letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700">✦ Master Synthesis</div>`;
      html += `<div style="font-size:23px;font-weight:600;color:#f1f5f9;margin-bottom:4px;font-family:Georgia,serif">${d.unifiedTheme||""}</div>`;
      html += `<div style="font-size:10px;color:#4a5568;margin-bottom:14px">${p.strengths.join(" · ")} · ${p.personality} · ${p.gifts.join(" · ")}</div>`;
      html += `<p style="font-size:14px;line-height:1.85;color:#94a3b8;margin-bottom:14px">${d.description||""}</p>`;
      html += renderM4Section("Kingdom Role", d.kingdomRole, C, "");
      html += renderM4Section("Team Contribution", d.teamContribution, C, "");
      html += renderM4Section("Shadow Side & Growth Edge", d.shadowSide, C, "warning");
      html += renderM4Section("Scripture Anchor", d.scripture, C, "scripture");
      if (d.prayer) {
        html += `<div style="background:${C}11;border:1px solid ${C}44;border-radius:6px;padding:12px 14px">`;
        html += `<div style="font-size:9px;color:${C};letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;font-weight:600">✦ Prayer of Commissioning</div>`;
        html += `<p style="font-size:14px;color:#cbd5e1;font-style:italic;line-height:1.9;margin:0">"${d.prayer}"</p>`;
        html += `</div>`;
      }
      html += `</div>`;
      html += `<div style="font-size:9px;color:#64748b;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;font-weight:600">Individual Strength Synthesis</div>`;
      p.strengths.forEach(s => {
        html += renderM4StrCard(s, p, cards[s] || null);
      });
    }
    // M4 Bonus streamlined summary
    if (state.m4Bonus === "loading") {
      html += summaryCard("loading", "#A0522D", "Streamlined Synthesis");
    } else if (state.m4Bonus) {
      html += '<div class="card" style="border-left:4px solid #A0522D;margin-top:6px">';
      html += '<div style="font-size:9px;color:#A0522D;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700">✦ Streamlined Synthesis</div>';
      html += '<div style="font-size:9px;color:#64748b;margin-bottom:12px">Top 3 Strengths · Personality · Top 3 Gifts</div>';
      html += '<div style="font-size:21px;font-weight:600;color:#f1f5f9;margin-bottom:10px;font-family:Georgia,serif">'+(state.m4Bonus.bonusTheme||"")+"</div>";
      html += '<p style="font-size:14px;line-height:1.85;color:#94a3b8;margin-bottom:12px">'+(state.m4Bonus.synthesis||"")+"</p>";
      if (state.m4Bonus.coreCall) html += '<div style="background:#A0522D22;border:1px solid #A0522D55;border-radius:6px;padding:10px 14px;margin-bottom:8px"><div style="font-size:9px;color:#A0522D;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;font-weight:600">✦ Core Call</div><p style="font-size:14px;color:#f1f5f9;font-weight:500;line-height:1.6;margin:0">'+(state.m4Bonus.coreCall)+"</p></div>";
      if (state.m4Bonus.blessing) html += '<div style="background:#A0522D11;border:1px solid #A0522D33;border-radius:6px;padding:12px 14px"><div style="font-size:9px;color:#A0522D;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px;font-weight:600">✦ Spoken Blessing</div><p style="font-size:14px;color:#cbd5e1;font-style:italic;line-height:1.9;margin:0">&quot;'+(state.m4Bonus.blessing)+"&quot;</p></div>";
      html += "</div>";
    }
    return html;
  }
  return "";
}

function validate() {
  const e={};
  if (!state.name.trim()) e.name="Name required";
  if (!state.personality) e.personality="Select personality type";
  state.strengths.forEach((s,i)=>{ if(!s) e[`s${i}`]="Required"; });
  const fs=state.strengths.filter(Boolean);
  if (new Set(fs).size!==fs.length) e.sdup="Strengths must be unique";
  const fg=state.gifts.filter(Boolean);
  if (fg.length<1) e.gifts="Select at least 1 spiritual gift";
  state.errors=e;
  return Object.keys(e).length===0;
}


function promptM1Summary(strengths, p) {
  const sAll = strengths.join(", ");
  const pBase = p.split("-")[0];
  const schema = '{"theme":"3-5 word poetic title for how this personality unifies these strengths","summary":"4-5 sentences on how the ' + pBase + ' personality creates a unified leadership style across all these strengths together — the combined effect not each one separately","teamRole":"2 sentences on the unified team role this combination creates"}';
  return "Faith-based leadership conference. Matrix 1 Summary for " + p + " personality (" + pBase + ") with these 5 strengths: " + sAll + ". Describe how this personality type shapes and unifies all these strengths together as one leadership style. Return pure JSON only no markdown: " + schema;
}

function promptM2Summary(strengths, gifts) {
  const sAll = strengths.join(", ");
  const gAll = gifts.join(", ");
  const schema = '{"theme":"3-5 word poetic title for how these gifts flow through these strengths","summary":"4-5 sentences on how these spiritual gifts activate and work through these natural strengths as a unified kingdom expression — the overall pattern not each pair","kingdomExpression":"2 sentences on the unique kingdom expression that emerges from this gifts and strengths combination"}';
  return "Faith-based leadership conference. Matrix 2 Summary: spiritual gifts (" + gAll + ") flowing through strengths (" + sAll + ") as a unified expression. Describe the overall pattern. Return pure JSON only no markdown: " + schema;
}

function promptM3Summary(p, gifts) {
  const pBase = p.split("-")[0];
  const gAll = gifts.join(", ");
  const schema = '{"theme":"3-5 word poetic title for how this personality channels these gifts","summary":"4-5 sentences on how the ' + pBase + ' personality uniquely channels these spiritual gifts together — the overall Spirit-empowered profile","empoweredIdentity":"2 sentences on who this person is when fully empowered by the Spirit through their personality"}';
  return "Faith-based leadership conference. Matrix 3 Summary: how does " + p + " personality (" + pBase + ") channel these spiritual gifts together: " + gAll + ". Return pure JSON only no markdown: " + schema;
}

function promptM4Bonus(name, strengths, p, gifts) {
  const top3S = strengths.slice(0, 3).join(", ");
  const top3G = gifts.slice(0, 3).join(", ");
  const pBase = p.split("-")[0];
  const schema = '{"bonusTheme":"3-5 word poetic title for this streamlined synthesis","synthesis":"3-4 tight focused sentences distilling the essence of ' + name + ' at the intersection of top 3 strengths and top 3 gifts through their personality — revelatory not general","coreCall":"One powerful sentence: the single most important thing ' + name + ' is called to do","blessing":"2-3 sentence spoken blessing over ' + name + ' specific to this streamlined profile"}';
  return "Faith-based leadership conference. Matrix 4 Bonus Streamlined Summary for " + name + ". Top 3 strengths: " + top3S + ". Personality: " + p + " (" + pBase + "). Top 3 gifts: " + top3G + ". Create a tight distilled synthesis. Return pure JSON only no markdown: " + schema;
}

async function generate() {
  if (!validate()) { render(); return; }
  const p = {name:state.name.trim(), personality:state.personality, strengths:[...state.strengths], gifts:state.gifts.filter(Boolean), id:Date.now()};
  state.participants.push(p);
  state.currentIdx = state.participants.length-1;
  state.m1Data={}; state.m2Data={}; state.m3Data={}; state.m4Data=null; state.m4Cards={}; state.m4Bonus=null;
  state.view="profile"; state.activeMatrix="m1";

  p.strengths.forEach(s=>{ state.m1Data[s]="loading"; });
  p.strengths.forEach(s=>{ p.gifts.forEach(g=>{ state.m2Data[`${s}|${g}`]="loading"; }); });
  p.gifts.forEach(g=>{ state.m3Data[g]="loading"; });
  render();

  // M1
  for (const s of p.strengths) {
    const res = await callAI(m1Prompt(s,p.personality), `m1|${s}|${p.personality}`);
    state.m1Data[s] = res || {description:`The ${s} strength expressed through the ${p.personality} personality creates a distinctive leadership presence.`, gift:`A unique contribution only this combination makes.`, prayer:`Lord, let this combination serve Your kingdom purposes.`};
    render();
  }

  // M2
  for (const s of p.strengths) {
    for (const g of p.gifts) {
      const res = await callAI(m2Prompt(s,g), `m2|${s}|${g}`);
      state.m2Data[`${s}|${g}`] = res || {description:`${s} and ${g} working together as a unified kingdom gift.`, gift:`A unique contribution to the body of Christ.`, prayer:`Lord, let my natural talent and spiritual gift work as one.`};
      // Don't re-render mid-generation here to avoid flicker — only render at end of each outer loop
    }
    render();
  }

  // M3
  for (const g of p.gifts) {
    const res = await callAI(m3Prompt(p.personality,g), `m3|${p.personality}|${g}`);
    state.m3Data[g] = res || {description:`The ${g} gift expressed through the ${p.personality} personality.`, gift:`A unique way the Spirit moves through this personality type.`, prayer:`Spirit, flow through how I'm made to express this gift.`};
    render();
  }

  // Matrix summaries
  state.m1Summary = "loading";
  state.m2Summary = "loading";
  state.m3Summary = "loading";
  render();
  const r1s = await callAI(promptM1Summary(p.strengths,p.personality),"m1sum|"+p.strengths.join(",")+"|"+p.personality);
  state.m1Summary = r1s||null; render();
  const r2s = await callAI(promptM2Summary(p.strengths,p.gifts),"m2sum|"+p.strengths.join(",")+"|"+p.gifts.join(","));
  state.m2Summary = r2s||null; render();
  const r3s = await callAI(promptM3Summary(p.personality,p.gifts),"m3sum|"+p.personality+"|"+p.gifts.join(","));
  state.m3Summary = r3s||null; render();

  // M4 master synthesis
  state.m4Cards = {};
  const m4res = await callAI(m4Prompt(p.name,p.strengths,p.personality,p.gifts), `m4|${p.strengths.join(",")}|${p.personality}|${p.gifts.join(",")}`);
  state.m4Data = m4res || {unifiedTheme:"Kingdom Servant Leader",description:`${p.name} carries a rare synthesis of natural talent, personality, and spiritual gift that positions them uniquely in God's kingdom design.`,kingdomRole:`A servant leader uniquely designed to advance God's kingdom.`,teamContribution:`Brings a combination of natural ability and Spirit-empowered gifting that elevates every team they serve.`,shadowSide:`The very strengths that make this combination powerful can become blind spots when not submitted to God's wisdom.`,scripture:`Ephesians 2:10 — "We are God's handiwork, created in Christ Jesus to do good works." Every dimension of how God wired ${p.name} is intentional.`,prayer:`${p.name}, you are God's masterpiece — wired with precision for purposes only you can fulfill. May your strengths serve His wisdom, your personality carry His grace, and your gifts flow with His power. Walk boldly in the fullness of who He made you to be.`};
  render();
  // M4 Bonus streamlined summary
  state.m4Bonus = "loading"; render();
  const rbns = await callAI(promptM4Bonus(p.name,p.strengths,p.personality,p.gifts), "m4bonus|"+p.strengths.slice(0,3).join(",")+"|"+p.personality+"|"+p.gifts.slice(0,3).join(","));
  state.m4Bonus = rbns || null; render();

  // M4 individual strength cards
  for (const s of p.strengths) {
    const res = await callAI(m4StrCard(p.name,s,p.personality,p.gifts), `m4c|${s}|${p.personality}|${p.gifts.join(",")}`);
    state.m4Cards[s] = res || {cardTheme:`${s} in Kingdom Purpose`,description:`The ${s} strength, expressed through the ${p.personality} personality and empowered by the ${p.gifts[0]} gift, creates a distinctive kingdom-powerful expression that belongs to ${p.name} alone.`,scripture:`Romans 12:6 — "We have different gifts, according to the grace given to each of us."`,prayer:`Lord, let ${p.name}'s ${s} strength be fully surrendered to You and activated by Your Spirit for kingdom purposes.`};
    render();
  }

  // ── AUTO-SAVE PROFILE TO STORAGE ──────────────────────────────────────────
  if (state.userEmail && state.userEmail !== "admin@kingdom") {
    await saveProfile(state.userEmail, {
      name: p.name,
      personality: p.personality,
      strengths: p.strengths,
      gifts: p.gifts,
      aiData: {
        m1Data: state.m1Data,
        m2Data: state.m2Data,
        m3Data: state.m3Data,
        m4Data: state.m4Data,
        m4Cards: state.m4Cards,
        m1Summary: state.m1Summary,
        m2Summary: state.m2Summary,
        m3Summary: state.m3Summary,
        m4Bonus: state.m4Bonus
      }
    });
    state.savedProfile = { savedAt: Date.now() };
    state.profileAge = 0;
  }
}

function selectParticipant(idx) {
  state.currentIdx=idx; state.view="profile"; state.shareMsg="";
  const p=state.participants[idx];
  // Restore from cache
  state.m1Data={}; state.m2Data={}; state.m3Data={};
  p.strengths.forEach(s=>{ state.m1Data[s]=aiCache[`m1|${s}|${p.personality}`]||null; });
  p.strengths.forEach(s=>{ p.gifts.forEach(g=>{ state.m2Data[`${s}|${g}`]=aiCache[`m2|${s}|${g}`]||null; }); });
  p.gifts.forEach(g=>{ state.m3Data[g]=aiCache[`m3|${p.personality}|${g}`]||null; });
  state.m4Data=aiCache[`m4|${p.strengths.join(",")}|${p.personality}|${p.gifts.join(",")}`]||null;
  state.m1Summary=aiCache["m1sum|"+p.strengths.join(",")+"|"+p.personality]||null;
  state.m2Summary=aiCache["m2sum|"+p.strengths.join(",")+"|"+p.gifts.join(",")]||null;
  state.m3Summary=aiCache["m3sum|"+p.personality+"|"+p.gifts.join(",")]||null;
  state.m4Bonus=aiCache["m4bonus|"+p.strengths.slice(0,3).join(",")+"|"+p.personality+"|"+p.gifts.slice(0,3).join(",")]||null;
  state.m4Cards={};
  p.strengths.forEach(s=>{ state.m4Cards[s]=aiCache[`m4c|${s}|${p.personality}|${p.gifts.join(",")}`]||null; });
  render();
}

function showDebug(msg) {
  let el = document.getElementById("debugBar");
  if (!el) {
    el = document.createElement("div");
    el.id = "debugBar";
    el.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#7f1d1d;color:#fca5a5;font-size:11px;padding:8px 12px;font-family:monospace;z-index:9999;max-height:120px;overflow-y:auto;border-top:1px solid #991b1b;white-space:pre-wrap;cursor:pointer;";
    el.title = "Click to dismiss";
    el.onclick = function(){ this.remove(); };
    document.body.appendChild(el);
  }
  el.textContent = "⚠ " + msg + " (click to dismiss)";
}
</script>

<div id="app" style="display:flex;flex-direction:column;height:100vh"></div>
<script>render();</script>
</body>
